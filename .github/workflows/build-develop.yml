name: CI — Develop

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable verbose build output'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. SDK validation — runs once, blocks builds if SDK is wrong ─────────────
  validate-sdk:
    name: Validate SDK
    runs-on: ubuntu-latest
    outputs:
      sdk-version: ${{ steps.version.outputs.value }}

    steps:
      - name: Restore SDK cache
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/connectiq-sdk
          key: connectiq-sdk-${{ vars.CIQ_SDK_VERSION }}

      - name: Install SDK
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          SDK_URL: ${{ secrets.CIQ_SDK_URL }}
        run: |
          if [ -z "$SDK_URL" ]; then
            echo "::error title=Missing secret::CIQ_SDK_URL is not configured. Go to Settings → Secrets and Variables → Actions."
            exit 1
          fi
          echo "Downloading Connect IQ SDK..."
          wget -q --show-progress "$SDK_URL" -O /tmp/sdk.zip
          mkdir -p "$HOME/connectiq-sdk"
          unzip -q /tmp/sdk.zip -d "$HOME/connectiq-sdk"
          echo "SDK installed."

      - name: Add SDK to PATH
        run: |
          BIN=$(find "$HOME/connectiq-sdk" -name "monkeyc" -type f | head -1 | xargs dirname)
          if [ -z "$BIN" ]; then
            echo "::error::monkeyc binary not found. SDK may be corrupted or not downloaded."
            exit 1
          fi
          chmod +x "$BIN/monkeyc"
          echo "$BIN" >> $GITHUB_PATH

      - name: Read SDK version
        id: version
        run: |
          VER=$(monkeyc --version 2>&1 | grep -oP '\d+\.\d+\.\d+' | head -1)
          echo "value=${VER}" >> $GITHUB_OUTPUT
          echo "Connect IQ SDK: ${VER}"

      - name: Verify device support
        run: |
          DEVICES_DIR=$(find "$HOME/connectiq-sdk" -name "devices" -type d | head -1)
          if [ -z "$DEVICES_DIR" ]; then
            echo "::error title=SDK invalid::devices/ directory not found in SDK."
            echo "::error::Your CIQ_SDK_URL must point to Connect IQ SDK 4.2.4 or later."
            exit 1
          fi
          REQUIRED=(fenix7 fenix7pro fenix7s fenix7x fr165 fr165m fr245 fr245m fr255 fr255m fr255s fr255sm fr265 fr265s fr955 vivoactive5)
          MISSING=()
          for d in "${REQUIRED[@]}"; do
            [[ ! -d "$DEVICES_DIR/$d" ]] && MISSING+=("$d")
          done
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error title=SDK too old::SDK ${{ steps.version.outputs.value }} does not support: ${MISSING[*]}"
            echo "::error::Update CIQ_SDK_URL to Connect IQ SDK 4.2.4 or later."
            exit 1
          fi
          echo "All 16 devices confirmed in SDK ${{ steps.version.outputs.value }} ✓"

  # ── 2. Parallel builds — one job per device ──────────────────────────────────
  build:
    name: Build / ${{ matrix.device }}
    runs-on: ubuntu-latest
    needs: validate-sdk
    strategy:
      fail-fast: false
      matrix:
        device:
          - fenix7
          - fenix7pro
          - fenix7s
          - fenix7x
          - fr165
          - fr165m
          - fr245
          - fr245m
          - fr255
          - fr255m
          - fr255s
          - fr255sm
          - fr265
          - fr265s
          - fr955
          - vivoactive5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore SDK cache
        uses: actions/cache@v4
        with:
          path: ~/connectiq-sdk
          key: connectiq-sdk-${{ vars.CIQ_SDK_VERSION }}

      - name: Add SDK to PATH
        run: |
          BIN=$(find "$HOME/connectiq-sdk" -name "monkeyc" -type f | head -1 | xargs dirname)
          chmod +x "$BIN/monkeyc"
          echo "$BIN" >> $GITHUB_PATH

      - name: Write developer key
        env:
          KEY_B64: ${{ secrets.DEVELOPER_KEY_B64 }}
        run: |
          if [ -z "$KEY_B64" ]; then
            echo "::error title=Missing secret::DEVELOPER_KEY_B64 is not configured."
            exit 1
          fi
          echo "$KEY_B64" | base64 --decode > developer_key.der

      - name: Compile
        id: compile
        run: |
          mkdir -p bin
          EXTRA_FLAGS=""
          [[ "${{ inputs.debug }}" == "true" ]] && EXTRA_FLAGS="-g"
          monkeyc \
            -o "bin/garminsmartwatch_${{ matrix.device }}.prg" \
            -f monkey.jungle \
            -y developer_key.der \
            -d "${{ matrix.device }}" \
            --release \
            $EXTRA_FLAGS
          SIZE=$(stat -c%s "bin/garminsmartwatch_${{ matrix.device }}.prg")
          echo "size=${SIZE}" >> $GITHUB_OUTPUT
          echo "garminsmartwatch_${{ matrix.device }}.prg — ${SIZE} bytes ✓"

      - name: Upload artifact
        if: steps.compile.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.device }}-${{ github.sha }}
          path: bin/garminsmartwatch_${{ matrix.device }}.prg
          retention-days: 7

  # ── 3. Final report — always runs, shows overall result ──────────────────────
  report:
    name: Build Report
    runs-on: ubuntu-latest
    needs: [validate-sdk, build]
    if: always()

    steps:
      - name: Write job summary
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          SDK_VERSION: ${{ needs.validate-sdk.outputs.sdk-version }}
        run: |
          [[ "$BUILD_RESULT" == "success" ]] && ICON="✅" || ICON="❌"
          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          # ${ICON} Build Report — Develop

          | | |
          |---|---|
          | **Branch** | \`${{ github.ref_name }}\` |
          | **Commit** | [\`${GITHUB_SHA:0:7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |
          | **SDK version** | \`${SDK_VERSION}\` |
          | **Trigger** | \`${{ github.event_name }}\` |
          | **Actor** | @${{ github.actor }} |
          | **Overall status** | **${BUILD_RESULT}** |

          Artifacts are retained for **7 days**.
          Expand individual **Build / \`<device>\`** jobs above for per-device compile output and file size.
          SUMMARY

      - name: Fail if builds failed
        if: needs.build.result != 'success'
        run: exit 1
