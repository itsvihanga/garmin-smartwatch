name: CI — Main

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. SDK validation ────────────────────────────────────────────────────────
  validate-sdk:
    name: Validate SDK
    runs-on: ubuntu-latest
    outputs:
      sdk-version: ${{ steps.version.outputs.value }}

    steps:
      - name: Restore SDK cache
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/connectiq-sdk
          key: connectiq-sdk-${{ vars.CIQ_SDK_VERSION }}

      - name: Install SDK
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          SDK_URL: ${{ secrets.CIQ_SDK_URL }}
        run: |
          if [ -z "$SDK_URL" ]; then
            echo "::error::CIQ_SDK_URL is not configured."
            exit 1
          fi
          wget -q --show-progress "$SDK_URL" -O /tmp/sdk.zip
          mkdir -p "$HOME/connectiq-sdk"
          unzip -q /tmp/sdk.zip -d "$HOME/connectiq-sdk"

      - name: Add SDK to PATH
        run: |
          MONKEYC=$(find "$HOME/connectiq-sdk" -name "monkeyc" -type f | head -1)
          if [ -z "$MONKEYC" ]; then
            echo "::error::monkeyc not found in $HOME/connectiq-sdk"
            find "$HOME/connectiq-sdk" -type d -maxdepth 4
            exit 1
          fi
          chmod +x "$MONKEYC"
          echo "$(dirname "$MONKEYC")" >> $GITHUB_PATH

      - name: Read SDK version
        id: version
        run: |
          VER=$(monkeyc --version 2>&1 | grep -oP '\d+\.\d+\.\d+' | head -1)
          echo "value=${VER}" >> $GITHUB_OUTPUT
          echo "Connect IQ SDK: ${VER}"

      - name: Verify device support
        run: |
          DEVICES_DIR=$(find "$HOME/connectiq-sdk" -name "devices" -type d | head -1)
          DEVICE_REF=$(find "$HOME/connectiq-sdk" -type d -name "device-reference" | head -1)
          DEVICES_XML=$(find "$HOME/connectiq-sdk" -name "devices.xml" -type f | head -1)
          # SDK 9.x uses resources/device-reference/ instead of devices/
          CHECK_DIR="${DEVICES_DIR:-$DEVICE_REF}"

          if [ -n "$CHECK_DIR" ]; then
            REQUIRED=(fenix7 fenix7pro fenix7s fenix7x fr165 fr165m fr245 fr245m fr255 fr255m fr255s fr255sm fr265 fr265s fr955 vivoactive5)
            MISSING=()
            for d in "${REQUIRED[@]}"; do
              [[ ! -d "$CHECK_DIR/$d" ]] && MISSING+=("$d")
            done
            if [[ ${#MISSING[@]} -gt 0 ]]; then
              echo "::error title=SDK too old::SDK ${{ steps.version.outputs.value }} does not support: ${MISSING[*]}"
              echo "::error::Update CIQ_SDK_URL to Connect IQ SDK 9.1.0."
              exit 1
            fi
            echo "All 16 devices confirmed ✓"
          elif [ -n "$DEVICES_XML" ]; then
            echo "::error title=SDK too old::SDK ${{ steps.version.outputs.value }} uses old devices.xml format."
            echo "::error::Update CIQ_SDK_URL to Connect IQ SDK 9.1.0."
            exit 1
          else
            echo "::error::No device definitions found."
            find "$HOME/connectiq-sdk" -type d -maxdepth 4
            exit 1
          fi

      - name: Test device recognition
        run: |
          RESULT=$(monkeyc -d fenix7 -f /nonexistent.jungle 2>&1 || true)
          if echo "$RESULT" | grep -qi "invalid device"; then
            echo "::error::monkeyc cannot recognize device IDs — the SDK zip is missing device compiler definitions."
            echo "::error::The 'devices/' directory with per-device spec files is absent from the extracted SDK."
            echo "::error::Fix: download the full Connect IQ SDK 9.1.0 zip from developer.garmin.com,"
            echo "::error::extract it, confirm it contains a 'devices/' folder with per-device subdirectories,"
            echo "::error::then zip the entire extracted SDK and upload it as CIQ_SDK_URL."
            exit 1
          fi
          echo "Device recognition test passed ✓"

  # ── 2. Parallel builds ───────────────────────────────────────────────────────
  build:
    name: Build / ${{ matrix.device }}
    runs-on: ubuntu-latest
    needs: validate-sdk
    strategy:
      fail-fast: false
      matrix:
        device:
          - fenix7
          - fenix7pro
          - fenix7s
          - fenix7x
          - fr165
          - fr165m
          - fr245
          - fr245m
          - fr255
          - fr255m
          - fr255s
          - fr255sm
          - fr265
          - fr265s
          - fr955
          - vivoactive5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore SDK cache
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/connectiq-sdk
          key: connectiq-sdk-${{ vars.CIQ_SDK_VERSION }}

      - name: Install SDK (cache miss fallback)
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          SDK_URL: ${{ secrets.CIQ_SDK_URL }}
        run: |
          wget -q "$SDK_URL" -O /tmp/sdk.zip
          mkdir -p "$HOME/connectiq-sdk"
          unzip -q /tmp/sdk.zip -d "$HOME/connectiq-sdk"

      - name: Add SDK to PATH
        run: |
          MONKEYC=$(find "$HOME/connectiq-sdk" -name "monkeyc" -type f | head -1)
          if [ -z "$MONKEYC" ]; then
            echo "::error::monkeyc not found — SDK install failed."
            exit 1
          fi
          chmod +x "$MONKEYC"
          echo "$(dirname "$MONKEYC")" >> $GITHUB_PATH

      - name: Write developer key
        env:
          KEY_B64: ${{ secrets.DEVELOPER_KEY_B64 }}
        run: |
          if [ -z "$KEY_B64" ]; then
            echo "::error::DEVELOPER_KEY_B64 is not configured."
            exit 1
          fi
          echo "$KEY_B64" | base64 --decode > developer_key.der

      - name: Compile
        id: compile
        run: |
          mkdir -p bin
          monkeyc \
            -o "bin/garminsmartwatch_${{ matrix.device }}.prg" \
            -f monkey.jungle \
            -y developer_key.der \
            -d "${{ matrix.device }}" \
            --release
          SIZE=$(stat -c%s "bin/garminsmartwatch_${{ matrix.device }}.prg")
          echo "size=${SIZE}" >> $GITHUB_OUTPUT
          echo "garminsmartwatch_${{ matrix.device }}.prg — ${SIZE} bytes ✓"

      - name: Upload artifact
        if: steps.compile.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.device }}-${{ github.sha }}
          path: bin/garminsmartwatch_${{ matrix.device }}.prg
          retention-days: 30

  # ── 3. Report ────────────────────────────────────────────────────────────────
  report:
    name: Build Report
    runs-on: ubuntu-latest
    needs: [validate-sdk, build]
    if: always()

    steps:
      - name: Write job summary
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          SDK_VERSION: ${{ needs.validate-sdk.outputs.sdk-version }}
        run: |
          [[ "$BUILD_RESULT" == "success" ]] && ICON="✅" || ICON="❌"
          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          # ${ICON} Build Report — Main

          | | |
          |---|---|
          | **Branch** | \`${{ github.ref_name }}\` |
          | **Commit** | [\`${GITHUB_SHA:0:7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |
          | **SDK version** | \`${SDK_VERSION}\` |
          | **Trigger** | \`${{ github.event_name }}\` |
          | **Actor** | @${{ github.actor }} |
          | **Overall status** | **${BUILD_RESULT}** |

          Artifacts retained for **30 days**.
          SUMMARY

      - name: Fail if builds failed
        if: needs.build.result != 'success'
        run: exit 1
